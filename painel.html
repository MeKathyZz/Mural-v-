<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural da Maria Amélia - Ouvir Homenagens</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="mural-style.css">
</head>

<body>

    <canvas id="starfield"></canvas>

    <div class="wrapper">
        <div class="convite-box aberto">

            <p class="titulo ouro-brilhante">
                <span class="estrela-girando">✨</span>
                MURAL DA MARIA AMÉLIA
                <span class="estrela-girando">✨</span>
            </p>

            <p class="subtitulo">Clique para ler as cartinhas!</p>

            <div id="lista-mensagens" class="bloco-input">
                <p style="text-align: center; color: #fff;">Carregando mensagens da família...</p>
            </div>
        </div>
    </div>

    <button onclick="carregarMensagens()" class="btn-flutuante-recarregar" aria-label="Atualizar Mural">
        <svg class="icone-girando" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M13.2381 4.11905C12.8339 4.02047 12.4208 4 12 4C7.58172 4 4 7.58172 4 12C4 13.9114 4.67139 15.6631 5.79417 17.0312M13.2381 4.11905V2M13.2381 4.11905H15.5M10.7619 19.881C11.1661 19.9795 11.5792 20 12 20C16.4183 20 20 16.4183 20 12C20 10.0886 19.3286 8.33686 18.2058 6.96875M10.7619 19.881V22M10.7619 19.881H8.5"
                stroke="#DAA520" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </button>

    <script src="stars.js"></script>
    <script src="painel-script.js"></script>
</body>

</html>
